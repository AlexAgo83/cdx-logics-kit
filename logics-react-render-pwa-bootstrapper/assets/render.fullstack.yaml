services:
  - type: web
    name: __FRONTEND_SERVICE_NAME__
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE
        value: https://REPLACE_ME_BACKEND_HOST
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: __BACKEND_SERVICE_NAME__
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm start
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGINS
        value: https://REPLACE_ME_FRONTEND_HOST
      - key: DATABASE_URL
        fromDatabase:
          name: __DATABASE_NAME__
          property: connectionString

databases:
  - name: __DATABASE_NAME__
    databaseName: __DATABASE_NAME__
    user: __DATABASE_NAME___user
    plan: free
